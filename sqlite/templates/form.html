<!DOCTYPE html>
<html>
<head>
<title>User Registration</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>User Registration</h2>

<form action="/submit" method="post" enctype="multipart/form-data">

<label>Name</label>
<input type="text" name="name" required>

<label>Phone</label>
<input type="text" name="phone" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Upload Resume</label>
<input type="file" name="resume" required>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
