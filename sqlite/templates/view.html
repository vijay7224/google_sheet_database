<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View File</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.338/pdf.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h3>{{ file.filename }}</h3>

    {% if file.type == 'pdf' %}
    <div id="pdf-container" style="height:600px; overflow:auto; border:1px solid #ccc;"></div>
    <script>
        const url = "{{ file.url }}";
        pdfjsLib.getDocument(url).promise.then(pdf => {
            for(let i=1; i<=pdf.numPages; i++){
                pdf.getPage(i).then(page => {
                    const scale = 1.5;
                    const viewport = page.getViewport({scale});
                    const canvas = document.createElement('canvas');
                    canvas.style.display = 'block';
                    canvas.style.margin = '10px auto';
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    document.getElementById('pdf-container').appendChild(canvas);
                    page.render({canvasContext: context, viewport: viewport});
                });
            }
        });
    </script>
    <div class="mt-2">
        <a href="{{ file.url }}" download="{{ file.filename }}" class="btn btn-success">Download PDF</a>
    </div>
    {% else %}
    <img src="{{ file.url }}" class="img-fluid">
    {% endif %}

    <div class="mt-3">
        <a href="/" class="btn btn-primary">Back</a>
    </div>
</div>
</body>
</html>
