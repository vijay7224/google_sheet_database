<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View File</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>{{ file.filename }}</h3>

    {% if file.type == 'pdf' %}
        <iframe src="{{ file.url }}" width="100%" height="600px" style="border:1px solid #ccc;"></iframe>
    {% else %}
        <img src="{{ file.url }}" class="img-fluid">
    {% endif %}

    <div class="mt-3">
        <a href="/" class="btn btn-primary">Back</a>
        <a href="{{ file.url }}" target="_blank" class="btn btn-success">Open in New Tab</a>
    </div>
</div>
</body>
</html>
