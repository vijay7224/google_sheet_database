<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cloud Document System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">☁️ Cloud Document System</h2>

    <div class="row">

        <!-- Upload -->
        <div class="col-md-6">
            <div class="card-box">
                <h5>Upload File</h5>

                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-3" required>
                    <button class="btn btn-primary w-100">Upload</button>
                </form>
            </div>
        </div>

        <!-- Files -->
        <div class="col-md-6">
            <div class="card-box">
                <h5>Files</h5>

                {% for file in files %}
                <div class="file-item">

                    <div>
                        <strong>{{ file.filename }}</strong><br>

                        {% if file.type == 'pdf' %}
                            <!-- PDF Preview -->
                            <iframe src="{{ file.url }}" width="200" height="150"></iframe>
                        {% else %}
                            <!-- Image Preview -->
                            <img src="{{ file.url }}" width="80">
                        {% endif %}
                    </div>

                    <div>
                        <a href="{{ file.url }}" target="_blank" class="btn btn-success btn-sm">
                            View
                        </a>

                        <a href="/delete/{{ file._id }}" class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </div>

                </div>
                {% endfor %}

            </div>
        </div>

    </div>

</div>

</body>
</html>
