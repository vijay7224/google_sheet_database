<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document Upload System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">

    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row">
        <div class="col-md-6">
            <div class="status-card p-4 shadow rounded bg-white">
                <h5>📂 Upload Documents</h5>
                <p class="text-muted">Upload marksheets & certificates</p>

                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-3" required>

                    <button class="btn btn-primary w-100">
                        <i class="fas fa-upload"></i> Upload
                    </button>
                </form>
            </div>
        </div>

        <div class="col-md-6">
            <div class="status-card p-4 shadow rounded bg-white">
                <h5>📄 Uploaded Files</h5>

                {% for file in files %}
                <div class="d-flex justify-content-between align-items-center border p-2 mb-2 rounded">
                    <span>{{ file.filename }}</span>

                    <a href="/delete/{{ file.filename }}" class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </div>
                {% endfor %}

            </div>
        </div>
    </div>

</div>

</body>
</html>
