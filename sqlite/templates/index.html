<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Document System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
<h2 class="text-center mb-4">☁️ Cloud Document System</h2>

<div class="row">
    <!-- Upload Section -->
    <div class="col-md-6 mb-3">
        <div class="card p-3">
            <h5>Upload File</h5>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <input type="file" name="file" class="form-control mb-3" required>
                <button class="btn btn-primary w-100">Upload</button>
            </form>
        </div>
    </div>

    <!-- Files Section -->
    <div class="col-md-6">
        <div class="card p-3">
            <h5>Files</h5>
            {% for file in files %}
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div>
                    <strong>{{ file.filename }}</strong><br>
                    {% if file.type != 'pdf' %}
                    <img src="{{ file.url }}" width="80" class="mt-1">
                    {% endif %}
                </div>
                <div>
                    {% if file.type == 'pdf' %}
                    <a href="/view/{{ file._id }}" class="btn btn-success btn-sm">View PDF</a>
                    <a href="{{ file.url }}" download="{{ file.filename }}" class="btn btn-info btn-sm">Download PDF</a>
                    {% else %}
                    <a href="{{ file.url }}" target="_blank" class="btn btn-success btn-sm">View Image</a>
                    {% endif %}
                    <a href="/delete/{{ file._id }}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
</div>
</body>
</html>
